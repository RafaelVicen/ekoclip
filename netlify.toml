# EkoClip - Configuração Netlify
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  base = "."

[functions]
  directory = "netlify/functions/"

# Redireciona a raiz para a página inicial (evita 404)
[[redirects]]
  from = "/"
  to = "/pages/index.html"
  status = 200

# Headers globais de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), fullscreen=(self), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://pagead2.googlesyndication.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://*.netlify.app https://*.netlify.com https://formspree.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io"

# Cache para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para páginas HTML
[[headers]]
  for = "/pages/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Formulários: permite embed no mesmo domínio
[[headers]]
  for = "/pages/contato.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/pages/pedido.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
