    <title>EkoClip - Bem-vindo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --color-primary: #ff6b6b;
        --color-secondary: #ff8c42;
        --color-accent: #ffd93d;
        --color-dark: #1a1a2e;
        --color-darker: #0f3460;
        --color-light: #ffffff;
        --color-muted: rgba(255, 255, 255, 0.6);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
        --shadow-md: 0 10px 30px rgba(255, 107, 107, 0.2);
        --shadow-lg: 0 20px 60px rgba(255, 107, 107, 0.3);
        --transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(
          135deg,
          var(--color-dark) 0%,
          var(--color-darker) 100%
        );
        color: var(--color-light);
        line-height: 1.6;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Background Effects */
      .bg-gradient {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          rgba(255, 107, 107, 0.05),
          rgba(255, 140, 66, 0.05)
        );
        z-index: -1;
      }

      .bg-blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(40px);
        z-index: -1;
      }

      .bg-blob-1 {
        width: 400px;
        height: 400px;
        background: rgba(255, 107, 107, 0.1);
        top: -100px;
        right: -100px;
        animation: float 15s ease-in-out infinite;
      }

      .bg-blob-2 {
        width: 300px;
        height: 300px;
        background: rgba(255, 140, 66, 0.1);
        bottom: -50px;
        left: -50px;
        animation: float 20s ease-in-out infinite 3s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(30px, -30px);
        }
      }

      /* Navigation */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(26, 26, 46, 0.7);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1000;
        padding: 15px 0;
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-logo {
        font-size: 1.5rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
        background: linear-gradient(
          135deg,
          var(--color-primary),
          var(--color-secondary)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .logo-icon {
        font-size: 1.8rem;
      }

      .nav-menu {
        display: flex;
        list-style: none;
        gap: 30px;
      }

      .nav-link {
        color: var(--color-light);
        text-decoration: none;
        transition: var(--transition);
        font-weight: 500;
      }

      .nav-link:hover {
        color: var(--color-primary);
      }

      .nav-toggle {
        display: none;
        background: none;
        border: none;
        color: var(--color-light);
        font-size: 1.5rem;
        cursor: pointer;
      }

      /* Welcome Section */
      .welcome-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 20px 40px;
        text-align: center;
      }

      .welcome-content {
        max-width: 600px;
        animation: fade-in 1s ease;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .welcome-icon {
        font-size: 80px;
        margin-bottom: 30px;
        display: inline-block;
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .welcome-title {
        font-size: 3rem;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 20px;
      }

      .gradient-text {
        background: linear-gradient(
          135deg,
          var(--color-primary),
          var(--color-secondary)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .welcome-subtitle {
        font-size: 1.3rem;
        color: var(--color-muted);
        margin-bottom: 15px;
      }

      .welcome-description {
        font-size: 1rem;
        color: var(--color-accent);
        margin-bottom: 40px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* Buttons */
      .btn {
        padding: 14px 40px;
        border: none;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: inline-block;
        position: relative;
        overflow: hidden;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--color-primary),
          var(--color-secondary)
        );
        color: white;
        box-shadow: var(--shadow-md);
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .btn:active {
        transform: translateY(-1px);
      }

      .btn-loader {
        margin-left: 8px;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      /* Benefits Section */
      .benefits-section {
        padding: 80px 20px;
        background: rgba(255, 255, 255, 0.02);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .section-title {
        font-size: 2.5rem;
        text-align: center;
        margin-bottom: 60px;
        font-weight: 700;
      }

      .benefits-grid {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
      }

      .benefit-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 107, 107, 0.2);
        border-radius: 15px;
        padding: 40px 30px;
        text-align: center;
        backdrop-filter: blur(10px);
        transition: var(--transition);
        opacity: 0;
        transform: translateY(30px);
      }

      .benefit-card.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .benefit-card:hover {
        background: rgba(255, 107, 107, 0.1);
        border-color: var(--color-primary);
        transform: translateY(-10px);
      }

      .benefit-icon {
        font-size: 3rem;
        margin-bottom: 20px;
      }

      .benefit-card h3 {
        font-size: 1.3rem;
        margin-bottom: 15px;
      }

      .benefit-card p {
        color: var(--color-muted);
        font-size: 0.95rem;
      }

      /* Footer */
      .footer {
        padding: 40px 20px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.02);
        font-size: 0.9rem;
        color: var(--color-muted);
      }

      .social-links {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
      }

      .social-links a {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid rgba(255, 107, 107, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-primary);
        text-decoration: none;
        transition: var(--transition);
        font-size: 1rem;
      }

      .social-links a:hover {
        background: var(--color-primary);
        color: white;
        transform: translateY(-3px);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .nav-menu {
          display: none;
          position: absolute;
          top: 60px;
          right: 0;
          flex-direction: column;
          background: rgba(26, 26, 46, 0.95);
          width: 100%;
          text-align: center;
          padding: 20px 0;
          gap: 10px;
        }

        .nav-menu.active {
          display: flex;
        }

        .nav-toggle {
          display: block;
        }

        .welcome-title {
          font-size: 2rem;
        }

        .welcome-subtitle {
          font-size: 1.1rem;
        }

        .section-title {
          font-size: 1.8rem;
        }

        .benefits-grid {
          grid-template-columns: 1fr;
        }
      }

      /* App Container */
      #app {
        position: relative;
        z-index: 1;
      }
    </style>
